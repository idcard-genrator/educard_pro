{% extends "base.html" %}

{% block content %}
<h2>All Students</h2>

<form action="{{ url_for('main.search_student') }}" method="POST" class="search-box">
    <input type="text" name="name" placeholder="Search student by name..." required>
    <button type="submit">Search</button>
</form>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Class</th>
        <th>Roll No</th>
        <th>Photo</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.student_class }}</td>
        <td>{{ student.roll_no }}</td>
        <td>
            {% if student.photo %}
            <img src="{{ url_for('static', filename='uploads/' + student.photo) }}" width="50">
            {% endif %}
        </td>
        <td>
    <a href="{{ url_for('main.edit_student', id=student.id) }}">
        <button class="edit-btn">Edit</button>
    </a>

    <a href="{{ url_for('main.id_card', id=student.id) }}">
        <button class="id-btn">Genrate ID Card</button>
</a>

    <a href="{{ url_for('main.delete_student', id=student.id) }}"
       onclick="return confirm('Are you sure?')">
        <button class="delete-btn">Delete</button>
    </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
