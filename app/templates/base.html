<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: white;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            padding: 10px 15px;
            background: #ff9800;
            border: none;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }

        .btn:hover {
            background: #e68900;
        }
    </style>

    <style>
.search-box {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.search-box input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

.search-box input:focus {
    border-color: #4CAF50;
    box-shadow: 0 0 8px #4CAF50;
}

.search-box button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.search-box button:hover {
    background: #45a049;
    transform: scale(1.05);
}
</style>

<style>
.edit-btn {
    background: #2196F3;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

.delete-btn {
    background: #f44336;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

.edit-btn:hover {
    background: #1976D2;
}

.delete-btn:hover {
    background: #d32f2f;
}
</style>

<style>
.id-btn {
    background: #6a11cb;
    background: linear-gradient(45deg, #6a11cb, #2575fc);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.id-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 10px #6a11cb;
}
</style>

<style>

.card-container {
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.id-card {
    width: 350px;
    border-radius: 15px;
    overflow: hidden;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease-in-out;
}

.card-header {
    background: linear-gradient(45deg, #2575fc, #6a11cb);
    color: white;
    text-align: center;
    padding: 15px;
}

.card-body {
    text-align: center;
    padding: 20px;
}

.card-photo {
    width: 120px;
    height: 120px;
    border-radius: 10px;
    object-fit: cover;
    margin-bottom: 15px;
    border: 3px solid #6a11cb;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

</style>

</head>
<body>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
